<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280">
  <defs>
    <!-- Degrados Metálicos para la Base y Rosca -->
    <linearGradient id="metalBase" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c858e"/>
      <stop offset="20%" stop-color="#b0bcc6"/>
      <stop offset="45%" stop-color="#fdfdfd"/>
      <stop offset="75%" stop-color="#a4b0ba"/>
      <stop offset="100%" stop-color="#555c63"/>
    </linearGradient>

    <linearGradient id="metalThread" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5b6268"/>
      <stop offset="25%" stop-color="#d3dde6"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#8e99a3"/>
      <stop offset="100%" stop-color="#3c4146"/>
    </linearGradient>

    <!-- Cristal de la Bombilla (Volumen y Transparencia) -->
    <radialGradient id="glassVolumen" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="25%" stop-color="#f4f7fa" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#e0e8ee" stop-opacity="0.1"/>
      <stop offset="85%" stop-color="#c9d3db" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a5b1bc" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Reflejo curvo del cristal (Specular Highlight) -->
    <radialGradient id="glassHighlight" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Soporte interior de cristal -->
    <linearGradient id="innerStem" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cbd3da" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b5bec6" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Resplandor opcional para el filamento (glow effect) -->
    <filter id="filamentGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Sombra base inferior -->
    <radialGradient id="bottomShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- TARJETA FONDO CON SOMBRA (Removido por petición) -->
  
  <g transform="translate(0, -5)">
    <!-- CRISTAL: CUERPO DE LA BOMBILLA -->
    <!-- Silueta base de la bombilla -->
    <path d="M 80 160 
             C 80 120, 60 100, 60 65 
             C 60 30, 85 15, 120 15 
             C 155 15, 180 30, 180 65 
             C 180 100, 160 120, 160 160 
             Z" 
          fill="url(#glassVolumen)" stroke="#b0b8c0" stroke-width="1.5"/>

    <!-- TALLO INTERIOR DE CRISTAL (Stem) -->
    <path d="M 105 160 L 105 125 C 105 110, 110 100, 120 100 C 130 100, 135 110, 135 125 L 135 160 Z" 
          fill="url(#innerStem)"/>
    <path d="M 115 100 L 115 75 M 125 100 L 125 75" stroke="#ced6dd" stroke-width="2.5" stroke-linecap="round"/>

    <!-- ALAMBRES CONDUCTORES (Soporte del filamento) -->
    <path d="M 115 75 L 85 55 M 125 75 L 155 55" stroke="#c08c40" stroke-width="2" stroke-linecap="round"/>
    <path d="M 115 100 L 85 55 M 125 100 L 155 55" stroke="#906930" stroke-width="1.5" stroke-linecap="round"/>

    <!-- EL FILAMENTO (Espiral) -->
    <!-- Simulamos las vueltas del filamento con un Path complejo -->
    <path d="M 85 55 Q 88 47 91 55 T 97 55 T 103 55 T 109 55 T 115 55 T 121 55 T 127 55 T 133 55 T 139 55 T 145 55 T 151 55 Q 153 47 155 55" 
          fill="none" stroke="#f6c535" stroke-width="2.5" stroke-linejoin="round" filter="url(#filamentGlow)"/>

    <!-- REFLEJOS CRISTAL (Para dar volumen 3D) -->
    <!-- Borde luminoso izquierdo -->
    <path d="M 80 160 C 80 120, 60 100, 60 65 C 60 30, 85 15, 120 15 C 155 15, 180 30, 180 65 C 180 100, 160 120, 160 160 Z" 
          fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.6"/>
    <!-- Brillo especular lado izquierdo -->
    <path d="M 72 75 C 70 50, 85 30, 110 25 C 90 35, 75 55, 78 85 C 80 100, 85 110, 92 120 C 85 110, 75 95, 72 75 Z" 
          fill="#ffffff" fill-opacity="0.8"/>

    <!-- BASE METÁLICA (ROSCA) -->
    <!-- Collar superior de la rosca -->
    <path d="M 83 160 L 157 160 L 155 170 L 85 170 Z" fill="url(#metalBase)"/>
    
    <!-- Anillos de la rosca con perspectiva -->
    <path d="M 84 170 Q 120 176 156 170 L 155 178 Q 120 184 85 178 Z" fill="url(#metalThread)"/>
    <path d="M 85 178 Q 120 184 155 178 L 153 186 Q 120 192 87 186 Z" fill="url(#metalThread)"/>
    <path d="M 87 186 Q 120 192 153 186 L 150 194 Q 120 200 90 194 Z" fill="url(#metalThread)"/>
    <path d="M 90 194 Q 120 200 150 194 L 146 202 Q 120 208 94 202 Z" fill="url(#metalThread)"/>
    
    <!-- Aislante inferior (Contacto negro) -->
    <path d="M 94 202 Q 120 208 146 202 L 138 212 Q 120 218 102 212 Z" fill="#2a2e33"/>
    
    <!-- Contacto central metálico (Tip) -->
    <path d="M 102 212 Q 120 218 138 212 L 132 219 Q 120 225 108 219 Z" fill="url(#metalBase)"/>
    <!-- Sombra debajo de la bombilla -->
    <ellipse cx="120" cy="223" rx="15" ry="4" fill="url(#bottomShadow)"/>

    <!-- TERMINALES L Y N (Para conectar los cables, alineados con Flutter) -->
    <!-- Posición relativa a la tarjeta contenedora: L = ~33%, N = ~67% -->
    <g transform="translate(0, 10)">
      <!-- Terminal Fase (L) -->
      <circle cx="80" cy="235" r="10" fill="#d32f2f" stroke="#ffffff" stroke-width="2.5" style="box-shadow: 0 4px 6px rgba(0,0,0,0.2)"/>
      <text x="80" y="260" font-family="sans-serif" font-size="14" font-weight="900" text-anchor="middle" fill="#333333">L</text>
      
      <!-- Terminal Neutro (N) -->
      <circle cx="160" cy="235" r="10" fill="#1565c0" stroke="#ffffff" stroke-width="2.5"/>
      <text x="160" y="260" font-family="sans-serif" font-size="14" font-weight="900" text-anchor="middle" fill="#333333">N</text>
    </g>
  </g>
</svg>
