<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <defs><filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.12"/></filter></defs>
  <!-- cuerpo -->
  <rect x="16" y="4" width="88" height="72" rx="7" fill="white" stroke="#e0e0e0" stroke-width="1.2" filter="url(#s)"/>
  <!-- barra básicos -->
  <rect x="16" y="4" width="88" height="9" rx="7" fill="#F5A623"/>
  <rect x="16" y="9" width="88" height="4" fill="#F5A623"/>
  <!-- placa -->
  <rect x="30" y="20" width="60" height="46" rx="5" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <!-- palanca abierta -->
  <circle cx="45" cy="43" r="4" fill="#555"/>
  <circle cx="75" cy="43" r="4" fill="#555"/>
  <line x1="45" y1="43" x2="71" y2="28" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <!-- texto -->
  <text x="60" y="74" font-family="Arial" font-size="7" font-weight="600" text-anchor="middle" fill="#555">Interruptor</text>
  <!-- pin L1 izquierda -->
  <line x1="0" y1="43" x2="16" y2="43" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="3" cy="43" r="4" fill="#e74c3c"/>
  <text x="12" y="38" font-family="Arial" font-size="6" font-weight="bold" fill="#e74c3c">L1</text>
  <!-- pin L2 derecha -->
  <line x1="104" y1="43" x2="120" y2="43" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="117" cy="43" r="4" fill="#e74c3c"/>
  <text x="104" y="38" font-family="Arial" font-size="6" font-weight="bold" fill="#e74c3c">L2</text>
</svg>
